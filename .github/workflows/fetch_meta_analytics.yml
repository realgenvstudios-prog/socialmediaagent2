name: Fetch Social Analytics

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests psycopg2-binary python-dotenv

      - name: Fetch Meta (Instagram + Facebook) analytics
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          META_PAGE_TOKEN:   ${{ secrets.META_PAGE_TOKEN }}
        run: python scripts/fetch_meta_analytics.py

      - name: Fetch YouTube analytics
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/fetch_youtube_analytics.py
