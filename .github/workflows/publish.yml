name: Post Clips

on:
  workflow_dispatch:  # triggered by Vercel cron via /api/cron, or manually from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests python-dotenv psycopg2-binary boto3

      - name: Post next clips
        run: python scripts/post_clips.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_API_KEY_2: ${{ secrets.ZERNIO_API_KEY_2 }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_ACCOUNT_ID: ${{ secrets.TIKTOK_ACCOUNT_ID }}
          YOUTUBE_ACCOUNT_ID: ${{ secrets.YOUTUBE_ACCOUNT_ID }}
          FACEBOOK_ACCOUNT_ID: ${{ secrets.FACEBOOK_ACCOUNT_ID }}

      - name: Log failure
        if: failure()
        run: echo "Workflow publish failed. Run ${{ github.run_id }}"
