name: Process Video (Manual)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube video ID (e.g. xwLrHUwGtJM)'
        required: true
      video_url:
        description: 'Full YouTube URL'
        required: true
      video_title:
        description: 'Video title (helps Claude pick better clips)'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — enough for any podcast

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js (required by yt-dlp for n-challenge solver)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-medium-v1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt && pip install "Pillow>=10.0.0"

      - name: Write YouTube cookies
        run: echo "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Start bgutil PO token provider
        run: |
          git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /tmp/bgutil
          cd /tmp/bgutil/server && npm ci && npx tsc
          node /tmp/bgutil/server/build/main.js &
          sleep 10

      - name: Process video
        run: |
          python scripts/process_video.py \
            --video_id="$INPUT_VIDEO_ID" \
            --url="$INPUT_VIDEO_URL" \
            --title="$INPUT_VIDEO_TITLE"
        env:
          INPUT_VIDEO_ID: ${{ github.event.inputs.video_id }}
          INPUT_VIDEO_URL: ${{ github.event.inputs.video_url }}
          INPUT_VIDEO_TITLE: ${{ github.event.inputs.video_title }}
          YTDLP_PROXY: ${{ secrets.YTDLP_PROXY }}
          YOUTUBE_COOKIES_FILE: /tmp/yt_cookies.txt
          NO_PROXY: huggingface.co,*.huggingface.co,cdn-lfs.huggingface.co
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_API_KEY_2: ${{ secrets.ZERNIO_API_KEY_2 }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_ACCOUNT_ID: ${{ secrets.TIKTOK_ACCOUNT_ID }}
          YOUTUBE_ACCOUNT_ID: ${{ secrets.YOUTUBE_ACCOUNT_ID }}
          FACEBOOK_ACCOUNT_ID: ${{ secrets.FACEBOOK_ACCOUNT_ID }}

      - name: Log failure to Supabase
        if: failure()
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/pipeline_errors" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"workflow\": \"process_manual\", \"run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
