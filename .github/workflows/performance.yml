name: Track Clip Performance

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC — after overnight posting runs
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and store engagement metrics
        run: python scripts/track_performance.py
        env:
          DATABASE_URL:           ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_URL:          ${{ secrets.R2_PUBLIC_URL }}
          ZERNIO_API_KEY:         ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_API_KEY_2:       ${{ secrets.ZERNIO_API_KEY_2 }}

      - name: Log failure
        if: failure()
        run: echo "Workflow performance failed. Run ${{ github.run_id }}"
